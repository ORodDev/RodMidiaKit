<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=680,H=420,WORLD_W=1800,GROUND_Y=310;
let SCALE_X=1,SCALE_Y=1;

const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

function adjustBoardLayout() {
  const b = document.getElementById('board');
  if (!b || b.style.display === 'none' || !dialogOpen) return;
  const S = Math.min(1, (window.innerWidth - 24) / 620, (window.innerHeight - 24) / 380);
  b.style.transform = `scale(${S}) translateY(0)`;
}

function resizeCanvas(){
  const dpr=window.devicePixelRatio||1;
  canvas.width=window.innerWidth*dpr;canvas.height=window.innerHeight*dpr;
  SCALE_X=canvas.width/W;
  SCALE_Y=canvas.height/H;
  ctx.imageSmoothingEnabled=false;
  adjustBoardLayout();
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();
let cam={x:0};
let player={x:80,y:GROUND_Y-36,vx:0,vy:0,dir:1,onGround:true};
let keys={},dialogOpen=false,nearSign=null,time=0,titleActive=true;
let audioCtx=null,audioEnabled=true,stepTimer=0,stepPhase=0;
let ambientStarted=false,ambientGain=null;
let jumpLatch=false,coyoteFrames=0;
let particles=[];
let allCoinsCelebration=0;
const GRAVITY=0.45,JUMP_FORCE=-9.5,MAX_FALL=14;
const terrainPts=[
  [0,310],[60,310],[160,304],[240,293],[310,300],[380,310],
  [430,310],[460,319],[490,326],[520,319],[550,310],
  [610,298],[660,280],[720,255],[780,238],[840,242],[900,264],
  [960,290],[1020,300],[1090,308],[1160,310],
  [1240,302],[1320,293],[1400,303],[1480,308],[1580,310],
  [1680,310],[1800,310]];
function getTerrainY(wx){
  wx=Math.max(0,Math.min(WORLD_W,wx));
  for(let i=0;i<terrainPts.length-1;i++){
    if(wx>=terrainPts[i][0]&&wx<=terrainPts[i+1][0]){
      const t=(wx-terrainPts[i][0])/(terrainPts[i+1][0]-terrainPts[i][0]);
      const st=t*t*(3-2*t);
      return terrainPts[i][1]+st*(terrainPts[i+1][1]-terrainPts[i][1]);
    }}
  return 310;
}
let POOL_W_START=-1,POOL_W_END=-1;
for(let _pw=400;_pw<=600;_pw++){if(getTerrainY(_pw)>GROUND_Y+3){if(POOL_W_START<0)POOL_W_START=_pw;POOL_W_END=_pw;}}
const platforms=[
  {x:160,y:GROUND_Y-46,w:56,h:10},
  {x:238,y:GROUND_Y-74,w:50,h:10},
  {x:392,y:GROUND_Y-56,w:60,h:10},
  {x:465,y:GROUND_Y-38,w:55,h:10},

  // Mountain approach ledges — guide the player up the big hill
  {x:755,y:224,w:50,h:10},
  {x:820,y:208,w:52,h:10},

  {x:948,y:GROUND_Y-90,w:52,h:10},
  {x:1112,y:GROUND_Y-54,w:56,h:10},
  {x:1180,y:GROUND_Y-72,w:50,h:10},
  {x:1362,y:GROUND_Y-58,w:60,h:10},

];

].map(c=>({...c,collected:false}));

function getAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function toggleAudio(){
  audioEnabled=!audioEnabled;
  document.getElementById('audiobtn').textContent='♪ SOM: '+(audioEnabled?'ON':'OFF');
  if(audioEnabled&&!ambientStarted){startAmbient();ambientStarted=true;}
  if(audioEnabled){
    if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
    if(ambientGain)ambientGain.gain.setTargetAtTime(0.07,audioCtx.currentTime,0.5);
  } else {
    if(ambientGain)ambientGain.gain.setTargetAtTime(0,audioCtx.currentTime,0.2);
  }
}

function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
    document.getElementById('fsbtn').textContent='⛶ JANELA';
  } else {
    document.exitFullscreen();
    document.getElementById('fsbtn').textContent='⛶ TELA CHEIA';
  }
}
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement)document.getElementById('fsbtn').textContent='⛶ TELA CHEIA';
});

function playTone(freq,type,vol,dur,attack,decay){
  if(!audioEnabled)return;
  const ac=getAudio();
  const o=ac.createOscillator();
  const g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type=type||'sine';o.frequency.value=freq;
  const t=ac.currentTime;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol||0.1,t+(attack||0.01));
  g.gain.exponentialRampToValueAtTime(0.001,t+(dur||0.2));
  o.start(t);o.stop(t+(dur||0.2)+(decay||0));
}

function playNoise(vol,dur,freq1,freq2){
  if(!audioEnabled)return;
  const ac=getAudio();
  const bufSize=ac.sampleRate*dur;
  const buf=ac.createBuffer(1,bufSize,ac.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++)data[i]=(Math.random()*2-1);
  const src=ac.createBufferSource();
  src.buffer=buf;
  const filt=ac.createBiquadFilter();
  filt.type='bandpass';
  filt.frequency.value=freq1||400;
  filt.Q.value=0.5;
  const g=ac.createGain();
  g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  src.connect(filt);filt.connect(g);g.connect(ac.destination);
  src.start();src.stop(ac.currentTime+dur);
}

function playStep(){
  if(!audioEnabled)return;
  playNoise(0.12,0.07,300,600);
  playTone(180+Math.random()*20,'sine',0.08,0.08);
}

function playBoardOpen(){
  if(!audioEnabled)return;
  const ac=getAudio();
  [220,330,440,550].forEach((f,i)=>{
    setTimeout(()=>playTone(f,'triangle',0.22,0.18),i*60);
  });
}

function playBoardClose(){
  if(!audioEnabled)return;
  [550,440,330,220].forEach((f,i)=>{
    setTimeout(()=>playTone(f,'triangle',0.16,0.12),i*50);
  });
}

function startAmbient(){
  if(!audioEnabled)return;
  const ac=getAudio();
  ambientGain=ac.createGain();
  ambientGain.gain.value=0;
  ambientGain.connect(ac.destination);
  // Wind — looping noise through bandpass + lowpass filters
  const bufSz=Math.floor(ac.sampleRate*3);
  const wBuf=ac.createBuffer(1,bufSz,ac.sampleRate);
  const wd=wBuf.getChannelData(0);
  for(let i=0;i<bufSz;i++)wd[i]=Math.random()*2-1;
  const wSrc=ac.createBufferSource();wSrc.buffer=wBuf;wSrc.loop=true;
  const wFilt=ac.createBiquadFilter();wFilt.type='bandpass';wFilt.frequency.value=650;wFilt.Q.value=0.35;
  const wLow=ac.createBiquadFilter();wLow.type='lowpass';wLow.frequency.value=1000;
  const wGain=ac.createGain();wGain.gain.value=0.20;
  wSrc.connect(wFilt);wFilt.connect(wLow);wLow.connect(wGain);wGain.connect(ambientGain);
  wSrc.start();
  // Wind swell LFO — very slow rise and fall
  const wLFO=ac.createOscillator();const wLG=ac.createGain();
  wLFO.type='sine';wLFO.frequency.value=0.022;wLG.gain.value=0.07;
  wLFO.connect(wLG);wLG.connect(wGain.gain);wLFO.start();
  // Soft pad — triangle waves (much warmer than sine), A minor pentatonic
  // A3 165 E3 220 A3 330 E4 — all slightly detuned for natural warmth
  [[165,0.065,1.2],[220,0.09,0],[330,0.055,-1.8],[440,0.028,2.4]].forEach(([f,v,dt])=>{
    const o=ac.createOscillator();const g=ac.createGain();
    o.type='triangle';o.frequency.value=f;o.detune.value=dt;
    g.gain.value=v;o.connect(g);g.connect(ambientGain);o.start();
  });
  // Master breathing LFO
  const lfo=ac.createOscillator();const lg=ac.createGain();
  lfo.type='sine';lfo.frequency.value=0.038;lg.gain.value=0.006;
  lfo.connect(lg);lg.connect(ambientGain.gain);lfo.start();
  // Slow fade in
  ambientGain.gain.setTargetAtTime(0.048,ac.currentTime,2.2);
}

];

function openBoard(key){
  const b=document.getElementById('board');
  const cfg=BOARDS[key];
  b.innerHTML='';
  
  const S = Math.min(1, (window.innerWidth - 24) / 620, (window.innerHeight - 24) / 380);
  
  b.style.cssText=`width:620px;height:380px;border-radius:10px;background:${cfg.color};border:3px solid ${cfg.border};box-shadow:0 0 0 1px rgba(255,255,255,0.07),inset 0 0 60px rgba(0,0,0,0.4);display:block;overflow:hidden;position:relative;transform:scale(${0.05 * S}) translateY(-800px);opacity:0;transition:transform 0.45s cubic-bezier(0.175,0.885,0.32,1.275),opacity 0.3s ease;`;
  const inner=document.createElement('div');
  inner.style.cssText='width:100%;height:100%;padding:22px 28px;';
  cfg.render(inner,cfg);
  b.appendChild(inner);
  
  // Close button
  const closeBtn=document.createElement('button');
  closeBtn.innerHTML='&#10006;';
  closeBtn.style.cssText=`position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.6);border:1.5px solid ${cfg.border};color:${cfg.accent};font-family:monospace;font-size:14px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:99;transition:all 0.15s;outline:none;user-select:none;-webkit-user-select:none;line-height:1;margin:0;padding:0;`;
  
  closeBtn.addEventListener('mouseover',()=>{
    closeBtn.style.background=cfg.border;
    closeBtn.style.color='#000';
  });
  closeBtn.addEventListener('mouseout',()=>{
    closeBtn.style.background='rgba(0,0,0,0.6)';
    closeBtn.style.color=cfg.accent;
  });
  
  const handleClose = (e)=>{
    e.preventDefault();
    e.stopPropagation();
    closeBoard();
  };
  closeBtn.addEventListener('click', handleClose);
  closeBtn.addEventListener('touchstart', handleClose, { passive: false });
  b.appendChild(closeBtn);

  b.style.display='block';
  document.getElementById('hint').style.opacity='0';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    b.style.transform=`scale(${S}) translateY(0)`;
    b.style.opacity='1';
  }));
  playBoardOpen();
  dialogOpen=true;
}

function closeBoard(){
  const b=document.getElementById('board');
  const S = Math.min(1, (window.innerWidth - 24) / 620, (window.innerHeight - 24) / 380);
  b.style.transform=`scale(${0.05 * S}) translateY(800px)`;
  b.style.opacity='0';
  playBoardClose();
  setTimeout(()=>{b.style.display='none';dialogOpen=false;if(!isTouchDevice)document.getElementById('hint').style.opacity='1';},400);

function mkBar(el,label,pct,color,accent){
  const w=document.createElement('div');w.style.cssText='margin-bottom:8px;';
  w.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:10px;color:rgba(255,255,255,0.7);">${label}</span><span style="font-size:10px;color:${accent};font-weight:bold;">${pct}%</span></div><div style="background:rgba(255,255,255,0.08);border-radius:3px;height:8px;overflow:hidden;"><div style="width:0%;height:100%;background:${color};border-radius:3px;transition:width 0.8s ease 0.2s;" data-w="${pct}%"></div></div>`;
  el.appendChild(w);
  setTimeout(()=>{const bar=w.querySelector('[data-w]');if(bar)bar.style.width=bar.dataset.w;},50);
}

document.addEventListener('keydown',e=>{
  if(titleActive){dismissTitle();return;}
  if(audioEnabled&&!ambientStarted){startAmbient();ambientStarted=true;}
  const mv=['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','d','w','s',' '];
  if(mv.includes(e.key)&&dialogOpen){closeBoard();return;}
  if(mv.includes(e.key))e.preventDefault();
  keys[e.key]=true;
  if((e.key==='e'||e.key==='Enter')&&nearSign&&!dialogOpen)openBoard(nearSign.key);
  if(e.key==='Escape'&&dialogOpen)closeBoard();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

function setupMobileControls() {
  const btnLeft = document.getElementById('btn-left');
  const btnRight = document.getElementById('btn-right');
  const btnJump = document.getElementById('btn-jump');
  const btnInteract = document.getElementById('btn-interact');

  if (!btnLeft || !btnRight || !btnJump || !btnInteract) return;

  function bindPress(btn, keyList) {
    const startHandler = (e) => {
      e.preventDefault();
      if (titleActive) { dismissTitle(); return; }
      if (audioEnabled && !ambientStarted) { startAmbient(); ambientStarted = true; }
      if (dialogOpen) { closeBoard(); return; }
      keyList.forEach(k => { keys[k] = true; });
    };

    const endHandler = (e) => {
      e.preventDefault();
      keyList.forEach(k => { keys[k] = false; });
    };

    btn.addEventListener('touchstart', startHandler, { passive: false });
    btn.addEventListener('touchend', endHandler, { passive: false });
    btn.addEventListener('touchcancel', endHandler, { passive: false });

    btn.addEventListener('mousedown', startHandler);
    btn.addEventListener('mouseup', endHandler);
    btn.addEventListener('mouseleave', endHandler);
  }

  bindPress(btnLeft, ['a', 'ArrowLeft']);
  bindPress(btnRight, ['d', 'ArrowRight']);
  bindPress(btnJump, [' ', 'ArrowUp', 'w']);

  const startInteract = (e) => {
    e.preventDefault();
    if (titleActive) { dismissTitle(); return; }
    if (audioEnabled && !ambientStarted) { startAmbient(); ambientStarted = true; }
    if (!dialogOpen && nearSign) {
      openBoard(nearSign.key);
    }
  };

  btnInteract.addEventListener('touchstart', startInteract, { passive: false });
  btnInteract.addEventListener('mousedown', startInteract);
}

if (isTouchDevice) {
  setupMobileControls();
  const tsPress = document.getElementById('ts-press');
  if (tsPress) {
    tsPress.textContent = 'Toque na tela para começar';
  }
}

function drawSky(){
  ctx.fillStyle='#0d1b3e';ctx.fillRect(0,0,W,H);
  const stars=[[40,20],[90,35],[150,15],[210,40],[280,12],[340,28],[400,8],[460,32],[520,18],[580,42],[640,22],[130,50],[700,10],[760,38],[820,25],[880,14],[940,30],[1000,6],[1060,44],[1120,20],[1180,35],[1240,16],[1300,40],[1360,8],[1420,28],[1480,42],[1540,18]];
  stars.forEach(([sx,sy])=>{
    const tw=0.5+0.5*Math.sin(time*0.03+sx);
    ctx.fillStyle=`rgba(255,255,220,${0.3+0.5*tw})`;
    ctx.fillRect(sx-cam.x*0.08,sy,tw>0.8?2:1,tw>0.8?2:1);
  });
  const mx=580-cam.x*0.04;
  ctx.fillStyle='#fffde0';ctx.beginPath();ctx.arc(mx,52,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0d1b3e';ctx.beginPath();ctx.arc(mx+10,45,18,0,Math.PI*2);ctx.fill();
}
function drawMountains(){
  ctx.fillStyle='#1a2a5a';
  const pts=[[0,200],[100,150],[200,180],[320,120],[440,160],[560,140],[680,170],[800,130],[920,155],[1040,125],[1160,145],[1280,160],[1400,140],[1520,170],[1600,200],[1800,210]];
  ctx.beginPath();ctx.moveTo(-cam.x*0.25,H);pts.forEach(([x,y])=>ctx.lineTo(x-cam.x*0.25,y));ctx.lineTo(WORLD_W,H);ctx.closePath();ctx.fill();
  ctx.fillStyle='#14204a';
  const pts2=[[0,230],[150,185],[300,210],[450,168],[600,188],[750,172],[900,192],[1050,162],[1200,182],[1350,170],[1500,188],[1600,210],[1800,230]];
  ctx.beginPath();ctx.moveTo(-cam.x*0.12,H);pts2.forEach(([x,y])=>ctx.lineTo(x-cam.x*0.12,y));ctx.lineTo(WORLD_W,H);ctx.closePath();ctx.fill();
}
function drawGround(){
  const camL=Math.max(0,cam.x-8),camR=Math.min(WORLD_W,cam.x+W+8);
  // Terrain body (path from bottom up to surface, so sky above is untouched)
  ctx.fillStyle='#2d4a1e';
  ctx.beginPath();ctx.moveTo(camL-cam.x,H);
  for(let wx=camL;wx<=camR;wx+=4)ctx.lineTo(wx-cam.x,getTerrainY(wx));
  ctx.lineTo(camR-cam.x,H);ctx.closePath();ctx.fill();
  // Soil sub-layer
  ctx.fillStyle='#1e3612';
  ctx.beginPath();ctx.moveTo(camL-cam.x,H);
  for(let wx=camL;wx<=camR;wx+=4)ctx.lineTo(wx-cam.x,getTerrainY(wx)+10);
  ctx.lineTo(camR-cam.x,H);ctx.closePath();ctx.fill();
  // Grass strip (skip pool depression)
  ctx.fillStyle='#3a6025';
  for(let wx=camL;wx<camR;wx+=16){const ty=getTerrainY(wx);if(ty<=GROUND_Y+2)ctx.fillRect(wx-cam.x,ty,16,5);}
  ctx.fillStyle='#4a7a30';
  for(let wx=camL;wx<camR;wx+=32){const ty=getTerrainY(wx+8);if(ty<=GROUND_Y+2)ctx.fillRect(wx+8-cam.x,ty,8,3);}
  // Scattered hillside rocks
  [[170,0],[292,3],[618,2],[876,5],[942,0],[1318,3]].forEach(([rx,rs])=>{
    if(rx>=camL-4&&rx<=camR+4){
      const ry=getTerrainY(rx);
      ctx.fillStyle='#504860';ctx.fillRect(rx-cam.x-rs,ry-3-rs,6+rs,4+rs);
      ctx.fillStyle='#605870';ctx.fillRect(rx-cam.x-rs+1,ry-4-rs,3+rs,2);
    }
  });
  // Pool water
  const waterY=GROUND_Y+4;
  if(POOL_W_END>0&&POOL_W_START<camR&&POOL_W_END>camL){
    const pw=POOL_W_END-POOL_W_START,cx=(POOL_W_START+POOL_W_END)/2;
    // Water body
    ctx.fillStyle='#1a4a8a';
    ctx.beginPath();ctx.moveTo(POOL_W_START-cam.x,waterY);
    for(let wx=POOL_W_START;wx<=POOL_W_END;wx+=2)ctx.lineTo(wx-cam.x,getTerrainY(wx));
    ctx.lineTo(POOL_W_END-cam.x,waterY);ctx.closePath();ctx.fill();
    // Shimmer
    const wsh=Math.sin(time*0.07)*2;
    ctx.fillStyle=`rgba(100,180,255,${0.13+0.07*Math.sin(time*0.09)})`;
    ctx.fillRect(cx-pw*0.35-cam.x,waterY+1+wsh,pw*0.7,3);
    ctx.fillStyle=`rgba(165,225,255,${0.08+0.05*Math.sin(time*0.13+1)})`;
    ctx.fillRect(cx-pw*0.2-cam.x,waterY+4+wsh*0.5,pw*0.4,2);
    // Ripple line
    ctx.save();ctx.strokeStyle=`rgba(80,155,235,${0.5+0.3*Math.sin(time*0.05)})`;ctx.lineWidth=1;
    ctx.beginPath();
    for(let wx=POOL_W_START;wx<=POOL_W_END;wx+=3){
      const ry=waterY+Math.sin(time*0.12+wx*0.06)*1.5;
      wx===POOL_W_START?ctx.moveTo(wx-cam.x,ry):ctx.lineTo(wx-cam.x,ry);
    }
    ctx.stroke();ctx.restore();
    // Lily pad
    const lilyBob=Math.sin(time*0.04)*0.8;
    const lx=480-cam.x,ly=waterY+0.5+lilyBob;
    ctx.save();ctx.translate(lx,ly);ctx.scale(1,0.6);
    ctx.fillStyle='#2a8a20';ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3aaa28';ctx.beginPath();ctx.arc(-2,-2,4.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // Flower on lily
    ctx.fillStyle='#ffaacc';ctx.beginPath();ctx.arc(lx,ly-2,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffe066';ctx.beginPath();ctx.arc(lx,ly-2,1.2,0,Math.PI*2);ctx.fill();
    // Pool bank grass tufts
    ctx.fillStyle='#4a9a30';
    for(let wx=POOL_W_START-20;wx<=POOL_W_END+20;wx+=10){
      if((wx<POOL_W_START-1||wx>POOL_W_END+1)&&wx>=camL&&wx<=camR){
        const ty=getTerrainY(wx);
        ctx.fillRect(wx-cam.x-1,ty-7,2,8);ctx.fillRect(wx-cam.x+3,ty-10,2,11);
      }
    }
  }
}
function drawCastle(wx){
  const x=wx-cam.x;
  const gy=Math.round(getTerrainY(wx+40));
  ctx.fillStyle='#3a3050';ctx.fillRect(x,gy-90,80,90);
  ctx.fillStyle='#2e2540';for(let i=0;i<4;i++)ctx.fillRect(x+i*22,gy-100,16,14);
  ctx.fillStyle='#4a3060';ctx.fillRect(x+5,gy-70,15,25);
  ctx.fillStyle='#c84040';ctx.fillRect(x-2,gy-105,4,22);
  ctx.fillStyle='#e05050';ctx.fillRect(x,gy-105,3,8);ctx.fillRect(x-2,gy-97,4,5);
  ctx.fillStyle='#ffd700';ctx.fillRect(x+24,gy-80,10,10);ctx.fillRect(x+46,gy-75,10,10);
}
function drawTree(wx,h){
  const x=wx-cam.x;
  const gy=Math.round(getTerrainY(wx+10));
  ctx.fillStyle='#4a3010';ctx.fillRect(x+6,gy-h+20,8,h-20);
  ctx.fillStyle='#1a5a20';ctx.fillRect(x,gy-h-10,20,30);
  ctx.fillStyle='#267a2a';ctx.fillRect(x+2,gy-h-25,16,20);
  ctx.fillStyle='#2a9a30';ctx.fillRect(x+5,gy-h-38,10,16);
}
function drawTorch(wx){
  const x=wx-cam.x;
  const gy=Math.round(getTerrainY(wx));
  if(gy>GROUND_Y+2)return;
  ctx.fillStyle='#6a4010';ctx.fillRect(x,gy-40,5,40);
  ctx.fillStyle='#8a5a20';ctx.fillRect(x-2,gy-43,9,6);
  const f=Math.sin(time*0.3+wx)*2;
  ctx.fillStyle='#ff6010';ctx.fillRect(x-1+f*0.3,gy-53,7,12);
  ctx.fillStyle='#ffb020';ctx.fillRect(x+f*0.2,gy-57,5,8);
  ctx.fillStyle='#ffe060';ctx.fillRect(x+1,gy-59,3,4);
}
function drawSign(sign){
  const x=Math.round(sign.x-cam.x);
  const near=nearSign===sign;
  const pulse=near?(0.5+0.5*Math.sin(time*0.15)):0;
  if(sign.portal){
    const gy=Math.round(getTerrainY(sign.x+36));
    const g=0.5+0.5*Math.sin(time*0.07+sign.x*0.01);
    ctx.fillStyle='#7a5818';ctx.fillRect(x+30,gy-84,12,84);
    ctx.fillStyle='#9a7830';ctx.fillRect(x+30,gy-84,12,3);
    ctx.fillStyle='#5a3a08';ctx.fillRect(x+30,gy-84,3,84);
    ctx.fillStyle='#0c0818';ctx.fillRect(x,gy-98,72,48);
    ctx.strokeStyle=`rgba(255,215,0,${0.42+g*0.48})`;ctx.lineWidth=2;
    ctx.strokeRect(x,gy-98,72,48);
    ctx.strokeStyle=`rgba(255,215,0,${0.12+g*0.13})`;ctx.lineWidth=1;
    ctx.strokeRect(x+3,gy-95,66,42);
    if(near){ctx.fillStyle=`rgba(255,215,0,${0.04+pulse*0.07})`;ctx.fillRect(x-6,gy-104,84,58);}
    ctx.fillStyle=`rgba(255,215,0,${0.85+g*0.15})`;
    ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText('⚔',x+36,gy-78);
    ctx.font='bold 8px monospace';
    ctx.fillStyle=`rgba(255,215,0,${0.7+g*0.3})`;
    ctx.fillText('SOCIAIS',x+36,gy-64);
    if(near){ctx.fillStyle=`rgba(255,220,80,${0.75+pulse*0.25})`;ctx.font='bold 9px monospace';ctx.fillText('[E] ABRIR',x+36,gy-52);}
    ctx.textAlign='left';
    return;
  }
  const gy=Math.round(getTerrainY(sign.x+33));
  ctx.fillStyle='#5a3010';ctx.fillRect(x+33,gy-58,6,63);
  ctx.fillStyle='#8a5520';ctx.fillRect(x,gy-68,72,38);
  ctx.fillStyle='#6a4010';ctx.fillRect(x+2,gy-66,68,34);
  ctx.fillStyle='#4a2a05';ctx.fillRect(x+4,gy-64,64,30);
  ctx.fillStyle='#c8a060';ctx.font='bold 11px monospace';ctx.textAlign='center';
  ctx.fillText(sign.label,x+36,gy-49);
  if(near){
    ctx.fillStyle=`rgba(255,220,80,${0.7+pulse*0.3})`;ctx.font='bold 10px monospace';ctx.fillText('[E] VER',x+36,gy-37);
    ctx.strokeStyle=`rgba(255,200,60,${0.3+pulse*0.4})`;ctx.lineWidth=1.5;ctx.strokeRect(x-2,gy-70,76,44);
  }
  ctx.textAlign='left';
}
function drawPlayer(){
  const px=Math.round(player.x-cam.x),py=Math.round(player.y);
  const wo=player.onGround&&Math.abs(player.vx)>0.5?Math.sin(time*0.25)*2:0;
  const d=player.dir;
  ctx.save();
  if(d<0){ctx.translate(px+16,0);ctx.scale(-1,1);ctx.translate(-px,0);}
  ctx.fillStyle='#c8a870';ctx.fillRect(px+5,py+4+wo,10,10);
  ctx.fillStyle='#707088';ctx.fillRect(px+3,py+wo,14,10);ctx.fillRect(px+3,py+3+wo,14,4);
  ctx.fillStyle='#9090b0';ctx.fillRect(px+3,py+1+wo,14,6);
  ctx.fillStyle='#504860';ctx.fillRect(px+3,py+wo,14,3);ctx.fillRect(px+3,py+wo,2,8);ctx.fillRect(px+15,py+wo,2,8);
  ctx.fillStyle='#fff';ctx.fillRect(px+6,py+4+wo,3,3);ctx.fillRect(px+10,py+4+wo,3,3);
  ctx.fillStyle='#223';ctx.fillRect(px+7,py+5+wo,2,2);ctx.fillRect(px+11,py+5+wo,2,2);
  ctx.fillStyle='#8080a8';ctx.fillRect(px+2,py+13+wo,12,14);
  const lo=player.onGround&&Math.abs(player.vx)>0.5?Math.sin(time*0.25)*3:0;
  ctx.fillStyle='#5a5878';ctx.fillRect(px+3,py+26+wo,5,8+lo);ctx.fillRect(px+10,py+26+wo,5,8-lo);
  ctx.fillStyle='#484060';ctx.fillRect(px+3,py+32+wo+lo,6,4);ctx.fillRect(px+10,py+32+wo-lo,6,4);
  ctx.fillStyle='#7888b0';ctx.fillRect(px-1,py+14+wo,4,10);ctx.fillRect(px+15,py+14+wo,4,10);
  if(d>0){ctx.fillStyle='#c0c0c0';ctx.fillRect(px+17,py+13+wo,2,18);ctx.fillStyle='#a0a0b0';ctx.fillRect(px+16,py+13+wo,3,3);ctx.fillRect(px+17,py+29+wo,4,2);}
  const co=player.onGround?Math.sin(time*0.08)*2:Math.sin(time*0.14)*(3+Math.abs(player.vy)*0.4);
  ctx.fillStyle='#9020a0';ctx.beginPath();ctx.moveTo(px+3,py+13+wo);ctx.lineTo(px+13,py+13+wo);ctx.lineTo(px+11+co,py+28+wo);ctx.lineTo(px+2+co,py+28+wo);ctx.closePath();ctx.fill();
  ctx.fillStyle='#b030c0';ctx.fillRect(px+3,py+13+wo,10,5);
  ctx.restore();
}

function drawPlatform(p){
  const x=Math.round(p.x-cam.x),y=p.y,w=p.w,h=p.h||10;
  ctx.fillStyle='#504a68';ctx.fillRect(x,y,w,h);
  ctx.fillStyle='#706880';ctx.fillRect(x,y,w,3);
  ctx.fillStyle='#302840';ctx.fillRect(x,y+h-2,w,2);
  ctx.fillStyle='#3c3450';
  const segs=Math.max(1,Math.floor(w/18));
  for(let i=1;i<segs;i++){const sx=x+Math.round(i*(w/segs));ctx.fillRect(sx,y+2,1,h-2);}
  ctx.fillStyle='#3a5a22';
  for(let mx=2;mx<w-2;mx+=10){if((p.x+mx)%20<12)ctx.fillRect(x+mx,y,Math.min(7,w-mx-2),2);}
  ctx.fillStyle='#2a4a18';
  for(let vx=5;vx<w-5;vx+=14){ctx.fillRect(x+vx,y+h,1,3+((p.x+vx)%5));}
}
function drawCollectible(c){
  if(c.collected)return;
  const x=c.x-cam.x,y=c.y;
  const glow=0.5+0.5*Math.sin(time*0.1+c.x*0.05);
  ctx.fillStyle=`rgba(255,230,50,${0.3+glow*0.25})`;
  ctx.fillRect(x-1,y-9,2,5);ctx.fillRect(x-1,y+4,2,5);
  ctx.fillRect(x-9,y-1,5,2);ctx.fillRect(x+4,y-1,5,2);
  ctx.fillStyle=`rgba(255,200,20,${0.75+glow*0.25})`;
  ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=`rgba(255,240,140,${0.6+glow*0.4})`;
  ctx.beginPath();ctx.arc(x-1,y-1,2.5,0,Math.PI*2);ctx.fill();
}
function spawnCollectParticles(wx,wy){
  for(let i=0;i<10;i++){
    const angle=(i/10)*Math.PI*2+Math.random()*0.3;
    const spd=1.5+Math.random()*2.5;
    particles.push({x:wx,y:wy,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-1.5,life:28,maxLife:28});
  }
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;});
}
function drawParticles(){
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    ctx.fillStyle=`rgba(255,215,0,${a})`;
    if(p.big){ctx.beginPath();ctx.arc(p.x-cam.x,p.y,2.5,0,Math.PI*2);ctx.fill();}
    else ctx.fillRect(p.x-cam.x-1,p.y-1,3,3);
  });
}
function triggerAllCoinsCelebration(){
  allCoinsCelebration=280;
  for(let i=0;i<90;i++){
    const wx=cam.x+Math.random()*W,wy=20+Math.random()*(H*0.78);
    const angle=Math.random()*Math.PI*2,spd=1.5+Math.random()*5;
    particles.push({x:wx,y:wy,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-2.5,life:80+Math.random()*100,maxLife:180,big:true});
  }
  playAllCoinsSound();
}
function playAllCoinsSound(){
  if(!audioEnabled)return;
  [392,523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>playTone(f,'triangle',0.18,0.35),i*70));
  setTimeout(()=>{[523,659,784,1047].forEach(f=>playTone(f,'triangle',0.16,1.1));},520);
}
function drawCelebration(){
  if(allCoinsCelebration<=0)return;
  allCoinsCelebration--;
  const t=allCoinsCelebration/280;
  if(t>0.87){const a=(t-0.87)/0.13*0.45;ctx.fillStyle=`rgba(255,215,0,${a})`;ctx.fillRect(0,0,W,H);}
  const ta=Math.min(1,t*4)*Math.min(1,(1-t)*4.5);
  if(ta>0.01){
    ctx.save();ctx.globalAlpha=ta;
    ctx.fillStyle='rgba(4,2,12,0.75)';ctx.fillRect(W/2-185,H/2-44,370,68);
    ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.strokeRect(W/2-185,H/2-44,370,68);
    ctx.strokeStyle='rgba(255,215,0,0.28)';ctx.lineWidth=1;ctx.strokeRect(W/2-181,H/2-40,362,60);
    ctx.fillStyle='#ffd700';ctx.font='bold 20px monospace';ctx.textAlign='center';
    ctx.fillText('\u2726 TODAS AS MOEDAS! \u2726',W/2,H/2-15);
    ctx.fillStyle='rgba(255,232,155,0.9)';ctx.font='bold 10px monospace';
    ctx.fillText('O REINO foi conquistado, AVENTUREIRO!',W/2,H/2+10);
    ctx.textAlign='left';ctx.restore();
  }
}
function drawHUD(){
  if(dialogOpen||titleActive)return;
  const tot=collectibles.length,col=collectibles.filter(c=>c.collected).length;
  if(col===0)return;
  const done=col===tot;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W-86,4,82,20);
  if(done){ctx.strokeStyle='rgba(255,215,0,0.55)';ctx.lineWidth=1;ctx.strokeRect(W-86,4,82,20);}
  ctx.fillStyle=done?'#ffd700':'rgba(255,210,50,0.78)';
  ctx.font='bold 10px monospace';ctx.textAlign='right';
  ctx.fillText(`\u2726 ${col}/${tot}`,W-8,17);
  ctx.textAlign='left';
}
function playJump(){
  if(!audioEnabled)return;
  playTone(380,'triangle',0.12,0.12);
  setTimeout(()=>playTone(520,'sine',0.08,0.1),55);
}
function playLand(){
  if(!audioEnabled)return;
  playNoise(0.14,0.06,180,360);
}
function playCollect(){
  if(!audioEnabled)return;
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.14,0.11),i*45));
}
function update(){
  time++;

  // Mobile HUD visibility & interact update
  const mobHUD = document.getElementById('mobileControls');
  if (mobHUD) {
    if (isTouchDevice && !titleActive && !dialogOpen) {
      mobHUD.style.display = 'flex';
      const interactBtn = document.getElementById('btn-interact');
      if (interactBtn) {
        interactBtn.style.display = nearSign ? 'flex' : 'none';
      }
    } else {
      mobHUD.style.display = 'none';
    }
  }

  if(dialogOpen||titleActive)return;
  const wasOnGround=player.onGround;
  const spd=2.8;
  const moving=(keys['ArrowLeft']||keys['a']||keys['ArrowRight']||keys['d']);
  if(keys['ArrowLeft']||keys['a']){player.vx=-spd;player.dir=-1;}
  else if(keys['ArrowRight']||keys['d']){player.vx=spd;player.dir=1;}
  else player.vx*=0.7;
  // Jump (coyote-time: can jump briefly after walking off edge)
  const jumpKey=keys[' ']||keys['ArrowUp']||keys['w'];
  if(jumpKey&&!jumpLatch&&(player.onGround||coyoteFrames>0)){
    player.vy=JUMP_FORCE;player.onGround=false;jumpLatch=true;coyoteFrames=0;playJump();
  }
  if(!jumpKey)jumpLatch=false;
  // Step sounds
  if(moving&&player.onGround){stepTimer++;if(stepTimer>=18){stepTimer=0;playStep();}}else{stepTimer=0;}
  // Physics
  player.vy=Math.min(player.vy+GRAVITY,MAX_FALL);
  player.x+=player.vx;
  player.y+=player.vy;
  player.x=Math.max(20,Math.min(WORLD_W-36,player.x));
  // Collision detection
  player.onGround=false;
  const _gy=getTerrainY(player.x+9);
  if(player.y+36>=_gy){player.y=_gy-36;player.vy=0;player.onGround=true;}
  platforms.forEach(p=>{
    if(player.vy>=0&&player.x+16>p.x&&player.x+4<p.x+p.w){
      const pb=player.y+36,prevPb=pb-player.vy;
      if(prevPb<=p.y+2&&pb>=p.y){player.y=p.y-36;player.vy=0;player.onGround=true;}
    }
  });
  // Coyote time: grace frames after walking off a ledge
  if(wasOnGround&&!player.onGround&&player.vy>0){coyoteFrames=8;}
  else if(coyoteFrames>0)coyoteFrames--;
  // Land sound
  if(player.onGround&&!wasOnGround)playLand();
  // Camera
  const target=Math.max(0,Math.min(WORLD_W-W,player.x-W/3));
  cam.x+=(target-cam.x)*0.08;
  cam.x=Math.max(0,Math.min(WORLD_W-W,cam.x));
  // Near sign (portal signs have tighter radius)
  nearSign=null;
  signs.forEach(s=>{const r=s.portal?42:55;if(Math.abs(player.x-(s.x+36))<r)nearSign=s;});
  // Collectibles
  collectibles.forEach(c=>{
    if(!c.collected&&Math.abs(player.x+9-c.x)<18&&Math.abs(player.y+18-c.y)<22){
      c.collected=true;spawnCollectParticles(c.x,c.y);playCollect();
      if(collectibles.every(co=>co.collected))triggerAllCoinsCelebration();
    }
  });
  updateParticles();
}

function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle='#0d1b3e';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(SCALE_X,0,0,SCALE_Y,0,0);
  drawSky();drawMountains();
  drawCastle(10);drawCastle(1680);
  [80,240,380,550,660,820,980,1100,1250,1380,1500,1620].forEach((tx,i)=>drawTree(tx,45+i%3*8));
  [130,300,480,620,750,900,1050,1200,1380,1530].forEach(tx=>drawTorch(tx));
  drawGround();
  platforms.forEach(p=>drawPlatform(p));
  collectibles.forEach(c=>drawCollectible(c));
  drawParticles();
  signs.forEach(s=>drawSign(s));
  drawPlayer();
  drawCelebration();
  drawHUD();
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
