
<style>

#fsbtn{position:absolute;top:10px;right:12px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,220,100,0.3);color:rgba(255,220,100,0.6);font-size:9px;padding:4px 8px;border-radius:4px;cursor:pointer;letter-spacing:1px;z-index:10;}
#audiobtn{position:absolute;top:10px;left:12px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,220,100,0.3);color:rgba(255,220,100,0.6);font-size:9px;padding:4px 8px;border-radius:4px;cursor:pointer;letter-spacing:1px;z-index:10;}

@keyframes tsGlow{0%,100%{filter:drop-shadow(0 0 8px rgba(255,215,0,.2))}50%{filter:drop-shadow(0 0 22px rgba(255,215,0,.55))}}

#ts-logo span{display:block;font-size:.6em;color:#ff9944;letter-spacing:7px;text-shadow:2px 2px 0 #6a2200,-2px -2px 0 #111,2px -2px 0 #111,-2px 2px 0 #111,2px 2px 0 #111;}#ts-sep{font-size:clamp(13px,2vw,18px);color:rgba(255,215,0,.45);letter-spacing:14px;animation:tsStars 2s ease-in-out 1.5s infinite;}
#ts-press{font-family:monospace;font-size:clamp(8px,1.3vw,12px);color:rgba(255,240,180,.75);letter-spacing:2px;text-transform:uppercase;animation:tsPress 1.4s ease-in-out 2.3s infinite;}
</style>

<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=680,H=420,WORLD_W=1800,GROUND_Y=310;
let SCALE_X=1,SCALE_Y=1;
function resizeCanvas(){
  const dpr=window.devicePixelRatio||1;
  canvas.width=window.innerWidth*dpr;canvas.height=window.innerHeight*dpr;
  SCALE_X=canvas.width/W;
  SCALE_Y=canvas.height/H;
  ctx.imageSmoothingEnabled=false;
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();
let cam={x:0};
let player={x:80,y:GROUND_Y-36,vx:0,dir:1,onGround:true};
let keys={},dialogOpen=false,nearSign=null,time=0,titleActive=true;
let audioCtx=null,audioEnabled=true,stepTimer=0,stepPhase=0;
let ambientStarted=false,ambientGain=null;

function getAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function toggleAudio(){
  audioEnabled=!audioEnabled;
  document.getElementById('audiobtn').textContent='♪ SOM: '+(audioEnabled?'ON':'OFF');
  if(audioEnabled&&!ambientStarted){startAmbient();ambientStarted=true;}
  if(audioEnabled){
    if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
    if(ambientGain)ambientGain.gain.setTargetAtTime(0.07,audioCtx.currentTime,0.5);
  } else {
    if(ambientGain)ambientGain.gain.setTargetAtTime(0,audioCtx.currentTime,0.2);
  }
}

function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
    document.getElementById('fsbtn').textContent='⛶ JANELA';
  } else {
    document.exitFullscreen();
    document.getElementById('fsbtn').textContent='⛶ TELA CHEIA';
  }
}
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement)document.getElementById('fsbtn').textContent='⛶ TELA CHEIA';
});

function playTone(freq,type,vol,dur,attack,decay){
  if(!audioEnabled)return;
  const ac=getAudio();
  const o=ac.createOscillator();
  const g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type=type||'sine';o.frequency.value=freq;
  const t=ac.currentTime;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol||0.1,t+(attack||0.01));
  g.gain.exponentialRampToValueAtTime(0.001,t+(dur||0.2));
  o.start(t);o.stop(t+(dur||0.2)+(decay||0));
}

function playNoise(vol,dur,freq1,freq2){
  if(!audioEnabled)return;
  const ac=getAudio();
  const bufSize=ac.sampleRate*dur;
  const buf=ac.createBuffer(1,bufSize,ac.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++)data[i]=(Math.random()*2-1);
  const src=ac.createBufferSource();
  src.buffer=buf;
  const filt=ac.createBiquadFilter();
  filt.type='bandpass';
  filt.frequency.value=freq1||400;
  filt.Q.value=0.5;
  const g=ac.createGain();
  g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  src.connect(filt);filt.connect(g);g.connect(ac.destination);
  src.start();src.stop(ac.currentTime+dur);
}

function playStep(){
  if(!audioEnabled)return;
  playNoise(0.12,0.07,300,600);
  playTone(180+Math.random()*20,'sine',0.08,0.08);
}

function playBoardOpen(){
  if(!audioEnabled)return;
  const ac=getAudio();
  [220,330,440,550].forEach((f,i)=>{
    setTimeout(()=>playTone(f,'triangle',0.22,0.18),i*60);
  });
}

function playBoardClose(){
  if(!audioEnabled)return;
  [550,440,330,220].forEach((f,i)=>{
    setTimeout(()=>playTone(f,'triangle',0.16,0.12),i*50);
  });
}

function startAmbient(){
  if(!audioEnabled)return;
  const ac=getAudio();
  ambientGain=ac.createGain();
  ambientGain.gain.value=0;
  ambientGain.connect(ac.destination);
  // Deep root drone
  const o1=ac.createOscillator();
  o1.type='sine';o1.frequency.value=55;
  o1.connect(ambientGain);o1.start();
  // Perfect fifth — adds warmth
  const o2=ac.createOscillator();
  o2.type='sine';o2.frequency.value=82.5;
  o2.connect(ambientGain);o2.start();
  // Octave, very faint
  const g3=ac.createGain();g3.gain.value=0.35;
  const o3=ac.createOscillator();
  o3.type='sine';o3.frequency.value=110;
  o3.connect(g3);g3.connect(ambientGain);o3.start();
  // Slow LFO breathing on volume
  const lfo=ac.createOscillator();
  const lg=ac.createGain();
  lfo.type='sine';lfo.frequency.value=0.06;
  lg.gain.value=0.012;
  lfo.connect(lg);lg.connect(ambientGain.gain);lfo.start();
  // Fade in
  ambientGain.gain.setTargetAtTime(0.07,ac.currentTime,1.5);
}

const BOARDS={
  tavern:{color:'#3a1a05',border:'#c8820a',accent:'#ffd700',render:renderTavern},
  stats:{color:'#0a1a3a',border:'#4a8aff',accent:'#7ab8ff',render:renderStats},
  platforms:{color:'#0a2a1a',border:'#2aaa60',accent:'#50e890',render:renderPlatforms},
  audience:{color:'#1a0a2e',border:'#8a40cc',accent:'#c078ff',render:renderAudience},
  games:{color:'#1a1005',border:'#cc6820',accent:'#ff9944',render:renderGames},
  brands:{color:'#2a1a00',border:'#cc8820',accent:'#ffcc44',render:renderBrands},
  contact:{color:'#0a2a2a',border:'#20aaaa',accent:'#40dddd',render:renderContact}
};

const signs=[
  {x:70,label:'INICIO',key:'tavern'},
  {x:300,label:'NUMEROS',key:'stats'},
  {x:540,label:'REDES',key:'platforms'},
  {x:780,label:'AUDIENCIA',key:'audience'},
  {x:1020,label:'MEUS JOGOS',key:'games'},
  {x:1260,label:'MARCAS',key:'brands'},
  {x:1500,label:'CONTATO',key:'contact'},
];

function openBoard(key){
  const b=document.getElementById('board');
  const cfg=BOARDS[key];
  b.innerHTML='';
  b.style.cssText=`width:620px;height:380px;border-radius:10px;background:${cfg.color};border:3px solid ${cfg.border};box-shadow:0 0 0 1px rgba(255,255,255,0.07),inset 0 0 60px rgba(0,0,0,0.4);display:block;overflow:hidden;position:relative;transform:scale(0.05) translateY(-800px);opacity:0;transition:transform 0.45s cubic-bezier(0.175,0.885,0.32,1.275),opacity 0.3s ease;`;
  const inner=document.createElement('div');
  inner.style.cssText='width:100%;height:100%;padding:22px 28px;';
  cfg.render(inner,cfg);
  b.appendChild(inner);
  b.style.display='block';
  document.getElementById('hint').style.opacity='0';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    b.style.transform='scale(1) translateY(0)';
    b.style.opacity='1';
  }));
  playBoardOpen();
  dialogOpen=true;
}

function closeBoard(){
  const b=document.getElementById('board');
  b.style.transform='scale(0.05) translateY(800px)';
  b.style.opacity='0';
  playBoardClose();
  setTimeout(()=>{b.style.display='none';dialogOpen=false;document.getElementById('hint').style.opacity='1';},400);
}
function playLogoSound(){
  const ac=getAudio();
  if(ac.state==='suspended')ac.resume();
  [[196,0,0.18,0.4],[294,110,0.15,0.38],[392,220,0.14,0.42],[523,330,0.16,0.52],[659,440,0.2,0.75]].forEach(([f,d,v,dur])=>{
    setTimeout(()=>playTone(f,'triangle',v,dur),d);
  });
}
function dismissTitle(){
  if(!titleActive)return;
  titleActive=false;
  if(audioEnabled)playLogoSound();
  const ts=document.getElementById('titlescreen');
  ts.classList.add('ts-exit');
  setTimeout(()=>{ts.remove();},450);
  if(audioEnabled&&!ambientStarted){startAmbient();ambientStarted=true;}
}

function mkTitle(el,txt,accent){
  const t=document.createElement('div');
  t.style.cssText=`font-size:14px;font-weight:bold;color:${accent};letter-spacing:2px;margin-bottom:14px;text-align:center;border-bottom:1px solid ${accent}33;padding-bottom:10px;`;
  t.textContent=txt;el.appendChild(t);
}

function mkRow(el,items,accent){
  const r=document.createElement('div');
  r.style.cssText='display:flex;gap:10px;margin-bottom:10px;';
  items.forEach(([label,val])=>{
    const c=document.createElement('div');
    c.style.cssText=`flex:1;background:rgba(255,255,255,0.06);border:1px solid ${accent}44;border-radius:6px;padding:10px 12px;text-align:center;`;
    c.innerHTML=`<div style="font-size:17px;font-weight:bold;color:${accent};margin-bottom:4px;">${val}</div><div style="font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:1px;">${label}</div>`;
    r.appendChild(c);
  });el.appendChild(r);
}

function mkBar(el,label,pct,color,accent){
  const w=document.createElement('div');w.style.cssText='margin-bottom:8px;';
  w.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:10px;color:rgba(255,255,255,0.7);">${label}</span><span style="font-size:10px;color:${accent};font-weight:bold;">${pct}%</span></div><div style="background:rgba(255,255,255,0.08);border-radius:3px;height:8px;overflow:hidden;"><div style="width:0%;height:100%;background:${color};border-radius:3px;transition:width 0.8s ease 0.2s;" data-w="${pct}%"></div></div>`;
  el.appendChild(w);
  setTimeout(()=>{const bar=w.querySelector('[data-w]');if(bar)bar.style.width=bar.dataset.w;},50);
}

document.addEventListener('keydown',e=>{
  if(titleActive){dismissTitle();return;}
  if(audioEnabled&&!ambientStarted){startAmbient();ambientStarted=true;}
  const mv=['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','d','w','s'];
  if(mv.includes(e.key)&&dialogOpen){closeBoard();return;}
  if(mv.includes(e.key))e.preventDefault();
  keys[e.key]=true;
  if((e.key==='e'||e.key==='Enter')&&nearSign&&!dialogOpen)openBoard(nearSign.key);
  if(e.key==='Escape'&&dialogOpen)closeBoard();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

function drawSky(){
  ctx.fillStyle='#0d1b3e';ctx.fillRect(0,0,W,H);
  const stars=[[40,20],[90,35],[150,15],[210,40],[280,12],[340,28],[400,8],[460,32],[520,18],[580,42],[640,22],[130,50],[700,10],[760,38],[820,25],[880,14],[940,30],[1000,6],[1060,44],[1120,20],[1180,35],[1240,16],[1300,40],[1360,8],[1420,28],[1480,42],[1540,18]];
  stars.forEach(([sx,sy])=>{
    const tw=0.5+0.5*Math.sin(time*0.03+sx);
    ctx.fillStyle=`rgba(255,255,220,${0.3+0.5*tw})`;
    ctx.fillRect(sx-cam.x*0.08,sy,tw>0.8?2:1,tw>0.8?2:1);
  });
  const mx=580-cam.x*0.04;
  ctx.fillStyle='#fffde0';ctx.beginPath();ctx.arc(mx,52,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0d1b3e';ctx.beginPath();ctx.arc(mx+10,45,18,0,Math.PI*2);ctx.fill();
}
function drawMountains(){
  ctx.fillStyle='#1a2a5a';
  const pts=[[0,200],[100,150],[200,180],[320,120],[440,160],[560,140],[680,170],[800,130],[920,155],[1040,125],[1160,145],[1280,160],[1400,140],[1520,170],[1600,200],[1800,210]];
  ctx.beginPath();ctx.moveTo(-cam.x*0.25,H);pts.forEach(([x,y])=>ctx.lineTo(x-cam.x*0.25,y));ctx.lineTo(WORLD_W,H);ctx.closePath();ctx.fill();
  ctx.fillStyle='#14204a';
  const pts2=[[0,230],[150,185],[300,210],[450,168],[600,188],[750,172],[900,192],[1050,162],[1200,182],[1350,170],[1500,188],[1600,210],[1800,230]];
  ctx.beginPath();ctx.moveTo(-cam.x*0.12,H);pts2.forEach(([x,y])=>ctx.lineTo(x-cam.x*0.12,y));ctx.lineTo(WORLD_W,H);ctx.closePath();ctx.fill();
}
function drawGround(){
  ctx.fillStyle='#2d4a1e';ctx.fillRect(-cam.x,GROUND_Y,WORLD_W,H-GROUND_Y);
  ctx.fillStyle='#3a6025';for(let x=0;x<WORLD_W;x+=16)ctx.fillRect(x-cam.x,GROUND_Y,16,6);
  ctx.fillStyle='#4a7a30';for(let x=0;x<WORLD_W;x+=32)ctx.fillRect(x+8-cam.x,GROUND_Y,8,3);
  ctx.fillStyle='#1a2a10';ctx.fillRect(-cam.x,GROUND_Y+30,WORLD_W,H-GROUND_Y-30);
  ctx.fillStyle='#583a1a';
  for(let x=0;x<WORLD_W;x+=40){ctx.fillRect(x-cam.x,GROUND_Y+35,36,4);ctx.fillStyle='#4a2e10';ctx.fillRect(x+2-cam.x,GROUND_Y+35,34,2);ctx.fillStyle='#583a1a';}
}
function drawCastle(wx){
  const x=wx-cam.x;
  ctx.fillStyle='#3a3050';ctx.fillRect(x,GROUND_Y-90,80,90);
  ctx.fillStyle='#2e2540';for(let i=0;i<4;i++)ctx.fillRect(x+i*22,GROUND_Y-100,16,14);
  ctx.fillStyle='#4a3060';ctx.fillRect(x+5,GROUND_Y-70,15,25);
  ctx.fillStyle='#c84040';ctx.fillRect(x-2,GROUND_Y-105,4,22);
  ctx.fillStyle='#e05050';ctx.fillRect(x,GROUND_Y-105,3,8);ctx.fillRect(x-2,GROUND_Y-97,4,5);
  ctx.fillStyle='#ffd700';ctx.fillRect(x+24,GROUND_Y-80,10,10);ctx.fillRect(x+46,GROUND_Y-75,10,10);
}
function drawTree(wx,h){
  const x=wx-cam.x;
  ctx.fillStyle='#4a3010';ctx.fillRect(x+6,GROUND_Y-h+20,8,h-20);
  ctx.fillStyle='#1a5a20';ctx.fillRect(x,GROUND_Y-h-10,20,30);
  ctx.fillStyle='#267a2a';ctx.fillRect(x+2,GROUND_Y-h-25,16,20);
  ctx.fillStyle='#2a9a30';ctx.fillRect(x+5,GROUND_Y-h-38,10,16);
}
function drawTorch(wx){
  const x=wx-cam.x;
  ctx.fillStyle='#6a4010';ctx.fillRect(x,GROUND_Y-40,5,40);
  ctx.fillStyle='#8a5a20';ctx.fillRect(x-2,GROUND_Y-43,9,6);
  const f=Math.sin(time*0.3+wx)*2;
  ctx.fillStyle='#ff6010';ctx.fillRect(x-1+f*0.3,GROUND_Y-53,7,12);
  ctx.fillStyle='#ffb020';ctx.fillRect(x+f*0.2,GROUND_Y-57,5,8);
  ctx.fillStyle='#ffe060';ctx.fillRect(x+1,GROUND_Y-59,3,4);
}
function drawSign(sign){
  const x=Math.round(sign.x-cam.x);
  const near=nearSign===sign;
  const pulse=near?(0.5+0.5*Math.sin(time*0.15)):0;
  ctx.fillStyle='#5a3010';ctx.fillRect(x+33,GROUND_Y-58,6,63);
  ctx.fillStyle='#8a5520';ctx.fillRect(x,GROUND_Y-68,72,38);
  ctx.fillStyle='#6a4010';ctx.fillRect(x+2,GROUND_Y-66,68,34);
  ctx.fillStyle='#4a2a05';ctx.fillRect(x+4,GROUND_Y-64,64,30);
  ctx.fillStyle='#c8a060';ctx.font='bold 11px monospace';ctx.textAlign='center';
  ctx.fillText(sign.label,x+36,GROUND_Y-49);
  if(near){
    ctx.fillStyle=`rgba(255,220,80,${0.7+pulse*0.3})`;ctx.font='bold 10px monospace';ctx.fillText('[E] VER',x+36,GROUND_Y-37);
    ctx.strokeStyle=`rgba(255,200,60,${0.3+pulse*0.4})`;ctx.lineWidth=1.5;ctx.strokeRect(x-2,GROUND_Y-70,76,44);
  }
  ctx.textAlign='left';
}
function drawPlayer(){
  const px=Math.round(player.x-cam.x),py=Math.round(player.y);
  const wo=player.onGround&&Math.abs(player.vx)>0.5?Math.sin(time*0.25)*2:0;
  const d=player.dir;
  ctx.save();
  if(d<0){ctx.translate(px+16,0);ctx.scale(-1,1);ctx.translate(-px,0);}
  ctx.fillStyle='#c8a870';ctx.fillRect(px+5,py+4+wo,10,10);
  ctx.fillStyle='#707088';ctx.fillRect(px+3,py+wo,14,10);ctx.fillRect(px+3,py+3+wo,14,4);
  ctx.fillStyle='#9090b0';ctx.fillRect(px+3,py+1+wo,14,6);
  ctx.fillStyle='#504860';ctx.fillRect(px+3,py+wo,14,3);ctx.fillRect(px+3,py+wo,2,8);ctx.fillRect(px+15,py+wo,2,8);
  ctx.fillStyle='#fff';ctx.fillRect(px+6,py+4+wo,3,3);ctx.fillRect(px+10,py+4+wo,3,3);
  ctx.fillStyle='#223';ctx.fillRect(px+7,py+5+wo,2,2);ctx.fillRect(px+11,py+5+wo,2,2);
  ctx.fillStyle='#8080a8';ctx.fillRect(px+2,py+13+wo,12,14);
  const lo=player.onGround&&Math.abs(player.vx)>0.5?Math.sin(time*0.25)*3:0;
  ctx.fillStyle='#5a5878';ctx.fillRect(px+3,py+26+wo,5,8+lo);ctx.fillRect(px+10,py+26+wo,5,8-lo);
  ctx.fillStyle='#484060';ctx.fillRect(px+3,py+32+wo+lo,6,4);ctx.fillRect(px+10,py+32+wo-lo,6,4);
  ctx.fillStyle='#7888b0';ctx.fillRect(px-1,py+14+wo,4,10);ctx.fillRect(px+15,py+14+wo,4,10);
  if(d>0){ctx.fillStyle='#c0c0c0';ctx.fillRect(px+17,py+13+wo,2,18);ctx.fillStyle='#a0a0b0';ctx.fillRect(px+16,py+13+wo,3,3);ctx.fillRect(px+17,py+29+wo,4,2);}
  const co=Math.sin(time*0.08)*2;
  ctx.fillStyle='#9020a0';ctx.beginPath();ctx.moveTo(px+3,py+13+wo);ctx.lineTo(px+13,py+13+wo);ctx.lineTo(px+11+co,py+28+wo);ctx.lineTo(px+2+co,py+28+wo);ctx.closePath();ctx.fill();
  ctx.fillStyle='#b030c0';ctx.fillRect(px+3,py+13+wo,10,5);
  ctx.restore();
}

function update(){
  time++;
  if(dialogOpen||titleActive)return;
  const spd=2.8;
  const moving=(keys['ArrowLeft']||keys['a']||keys['ArrowRight']||keys['d']);
  if(keys['ArrowLeft']||keys['a']){player.vx=-spd;player.dir=-1;}
  else if(keys['ArrowRight']||keys['d']){player.vx=spd;player.dir=1;}
  else player.vx*=0.7;
  if(moving&&player.onGround){
    stepTimer++;
    if(stepTimer>=18){stepTimer=0;playStep();}
  } else {stepTimer=0;}
  player.x+=player.vx;
  player.x=Math.max(20,Math.min(WORLD_W-36,player.x));
  player.y=GROUND_Y-36;player.onGround=true;
  const target=Math.max(0,Math.min(WORLD_W-W,player.x-W/3));
  cam.x+=(target-cam.x)*0.08;
  cam.x=Math.max(0,Math.min(WORLD_W-W,cam.x));
  nearSign=null;
  signs.forEach(s=>{if(Math.abs(player.x-(s.x+36))<55)nearSign=s;});
}

function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle='#0d1b3e';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(SCALE_X,0,0,SCALE_Y,0,0);
  drawSky();drawMountains();
  drawCastle(10);drawCastle(1680);
  [80,240,380,550,660,820,980,1100,1250,1380,1500,1620].forEach((tx,i)=>drawTree(tx,45+i%3*8));
  [130,300,480,620,750,900,1050,1200,1380,1530].forEach(tx=>drawTorch(tx));
  drawGround();
  signs.forEach(s=>drawSign(s));
  drawPlayer();
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
